<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behavioral Simulation Replication</title>
  <link rel="stylesheet" href="static/css/main.css?v=202603241607" />
</head>
<body>
  <header>
    <h1>Behavioral Experiment Replication</h1>
    <p class="subtitle">
      AI-based replications of behavioral economics experiments from top-5 journals
      (AER, QJE, JPE, REStud, Econometrica) using LLM agents via
      <a href="https://www.expectedparrot.com" target="_blank">edsl</a>.
    </p>
  </header>

  <main>
    <section id="filters">
      <input id="searchInput" type="text" placeholder="Search papers..." />
      <select id="journalFilter">
        <option value="">All journals</option>
        <option value="AER">AER</option>
        <option value="QJE">QJE</option>
        <option value="JPE">JPE</option>
        <option value="REStud">REStud</option>
        <option value="Econometrica">Econometrica</option>
      </select>
    </section>

    <section id="leaderboard-section">
      <h2>Model Leaderboard</h2>
      <div id="leaderboard"></div>
    </section>

    <section id="paper-list"></section>

    <section id="paper-detail" class="hidden"></section>
  </main>

  <script src="static/js/app.js?v=202603241607"></script>
</body>
</html>
